name: Site QA

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audit dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Audit core pages and local references
        run: python scripts/audit_core_site.py

      - name: Audit the legacy blog migration
        run: python scripts/audit_blog_migration.py
