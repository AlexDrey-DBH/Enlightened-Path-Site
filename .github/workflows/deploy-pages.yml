name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare public site
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='docs/' \
            --exclude='samples/' \
            --exclude='tmp/' \
            --exclude='_site/' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='_redirects' \
            ./ _site/

      - name: Build clean URL route copies
        run: |
          while IFS=':' read -r route source; do
            target="_site/$route/index.html"
            mkdir -p "$(dirname "$target")"
            cp "_site/$source" "$target"
            perl -0pi -e 's#<head>#<head>\n  <base href="/">#' "$target"
            perl -0pi -e "s#href=\"\\#\"#href=\"/$route\\#\"#g" "$target"
          done <<'ROUTES'
          about:about-lisa.html
          contact:contact.html
          corporate-wellness:corporate-wellness.html
          services:services.html
          testimonials:testimonials.html
          reiki-energy-healing:reiki-energy-healing.html
          akashic-records:akashic-records.html
          meditation:meditation.html
          work-trauma:work-trauma-coaching.html
          resources:resources.html
          healernextdoor:healernextdoor.html
          ROUTES

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
